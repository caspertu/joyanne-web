name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [chapters-updated]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout joyanne-web
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout ihavenoidea chapters
        env:
          IHAVENOIDEA_PAT: ${{ secrets.IHAVENOIDEA_PAT }}
        run: |
          if [ -n "$IHAVENOIDEA_PAT" ]; then
            git clone --depth 1 \
              "https://x-access-token:${IHAVENOIDEA_PAT}@github.com/${{ vars.IHAVENOIDEA_REPO || 'caspertu/ihavenoidea' }}.git" \
              /tmp/ihavenoidea
          else
            echo "No PAT — using checked-in synced chapters"
            mkdir -p /tmp/ihavenoidea
            cp -r src/content/chapters /tmp/ihavenoidea/chapters 2>/dev/null || true
          fi

      - name: Build
        env:
          IHAVENOIDEA_ROOT: /tmp/ihavenoidea
          CHAPTERS_VARIANT: chapter_v2
        run: npm run build

      - name: Deploy to Cloudflare Pages
        continue-on-error: true
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: npx wrangler pages deploy dist --project-name=joyanne-web